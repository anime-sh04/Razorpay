<!DOCTYPE html>

<html>
<head>
    <title>MediBook Payment Test</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body style="font-family: Arial; padding: 40px;">

```
<h2>💳 MediBook Payment Demo</h2>

<button onclick="startPayment()" style="padding: 10px 20px; font-size: 16px;">
    Pay ₹500
</button>

<pre id="log" style="margin-top:20px; background:#f4f4f4; padding:15px;"></pre>

<script>
    const API_BASE = "http://localhost:5005/api/v1/payments"; // ⚠️ change port if needed

    function log(msg) {
        document.getElementById("log").innerText += msg + "\\n";
    }

    async function startPayment() {
        log("➡️ Creating order...");

        const processRes = await fetch(`${API_BASE}/process`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                appointmentId: 2,
                patientId: "11111111-1111-1111-1111-111111111111",
                providerId: "22222222-2222-2222-2222-222222222222",
                amount: 500,
                mode: "UPI",
                currency: "INR"
            })
            
        });

        const data = await processRes.json();

        log("✅ Order created:");
        log(JSON.stringify(data, null, 2));

        const options = {
            key: data.razorpayOrder.keyId,
            amount: data.razorpayOrder.amountInPaise,
            currency: data.razorpayOrder.currency,
            order_id: data.razorpayOrder.razorpayOrderId,

            handler: async function (response) {
                log("💰 Payment Success:");
                log(JSON.stringify(response, null, 2));

                await confirmPayment(data.payment.paymentId, response);
            },

            theme: {
                color: "#3399cc"
            }
        };

        const rzp = new Razorpay(options);
        rzp.open();
    }

    async function confirmPayment(paymentId, response) {
        log("➡️ Confirming payment...");

        const confirmRes = await fetch(`${API_BASE}/confirm`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                paymentId: paymentId,
                razorpayOrderId: response.razorpay_order_id,
                razorpayPaymentId: response.razorpay_payment_id,
                razorpaySignature: response.razorpay_signature,
                transactionId: "txn_demo_" + Date.now()
            })
        });

        const confirmData = await confirmRes.json();

        log("✅ Payment Confirmed:");
        log(JSON.stringify(confirmData, null, 2));
    }
</script>
```

</body>
</html>
